name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - '**'

jobs:
  test-make:
    name: Test with Make (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create venv and install dependencies
        run: make install

      - name: Run tests
        run: make test

  test-docker:
    name: Test with Docker (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: test-make

    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: |
          docker build \
            --build-arg PYTHON_VERSION=${{ matrix.python-version }} \
            -t oldp-test:${{ github.sha }}-py${{ matrix.python-version }} \
            .

      - name: Run tests in container
        run: |
          docker run --rm -e DJANGO_CONFIGURATION=TestConfiguration oldp-test:${{ github.sha }}-py${{ matrix.python-version }} python manage.py test

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test-docker
    # Only push images on branch pushes, not on PRs
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/oldp:${{ github.sha }} .

      - name: Tag Docker image with ref name
        run: |
          IMAGE_TAG=${GITHUB_REF_NAME//\//-}
          docker tag ghcr.io/${{ github.repository_owner }}/oldp:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/oldp:$IMAGE_TAG

      - name: Tag Docker image as latest if master
        if: github.ref_name == 'master'
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/oldp:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/oldp:latest

      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/oldp:${{ github.sha }}
          IMAGE_TAG=${GITHUB_REF_NAME//\//-}
          docker push ghcr.io/${{ github.repository_owner }}/oldp:$IMAGE_TAG
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            docker push ghcr.io/${{ github.repository_owner }}/oldp:latest
          fi
